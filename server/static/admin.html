<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPy Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #0a0a0a; color: #e0e0e0; padding: 20px; }
        h1 { color: #00ff00; margin-bottom: 20px; }
        h2 { color: #00aaff; margin: 20px 0 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 0; }
        .card h3 { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .card .value { font-size: 28px; color: #00ff00; }
        .card .value.warn { color: #ffaa00; }
        .card .value.err { color: #ff3333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; font-size: 13px; }
        th { color: #888; text-transform: uppercase; font-size: 11px; }
        .badge { padding: 2px 8px; border-radius: 0; font-size: 11px; }
        .badge.ok { background: #00ff00; color: #000; }
        .badge.err { background: #ff3333; color: #fff; }
        .badge.warn { background: #ffaa00; color: #000; }
        input, button { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px; font-family: monospace; }
        button { cursor: pointer; color: #00ff00; }
        button:hover { background: #333; }
        #login { max-width: 400px; margin: 100px auto; }
        #dashboard { display: none; }
        .refresh { float: right; }
    </style>
</head>
<body>

<div id="login">
    <h1>ChatPy Admin</h1>
    <p style="color:#888;margin-bottom:20px">Painel de administração — requer login</p>
    <input type="text" id="server" placeholder="http://localhost:5000" style="width:100%;margin-bottom:10px" value="http://localhost:5000">
    <input type="text" id="username" placeholder="apelido" style="width:100%;margin-bottom:10px">
    <input type="password" id="password" placeholder="senha" style="width:100%;margin-bottom:10px">
    <button onclick="doLogin()" style="width:100%">ENTRAR</button>
    <div id="loginError" style="color:#ff3333;margin-top:10px"></div>
</div>

<div id="dashboard">
    <h1>ChatPy Admin <button class="refresh" onclick="loadAll()">↻ Atualizar</button></h1>

    <div class="grid" id="kpis"></div>

    <h2>Usuários Online</h2>
    <table id="usersTable"><thead><tr><th>Username</th><th>Status</th></tr></thead><tbody></tbody></table>

    <h2>Salas</h2>
    <table id="roomsTable"><thead><tr><th>Sala</th><th>Tipo</th><th>Descrição</th></tr></thead><tbody></tbody></table>

    <h2>Peers Federados</h2>
    <table id="peersTable"><thead><tr><th>Domínio</th><th>URL Base</th><th>Trust</th><th>Ativo</th></tr></thead><tbody></tbody></table>

    <h2>Backups</h2>
    <div id="backups"></div>
    <button onclick="triggerBackup()" style="margin-top:10px">⚡ Backup Agora</button>

    <h2>Saúde do Servidor</h2>
    <pre id="health" style="background:#1a1a1a;padding:15px;overflow-x:auto;font-size:12px"></pre>
</div>

<script>
let token = localStorage.getItem('chatpy_admin_token');
let baseUrl = localStorage.getItem('chatpy_admin_server') || 'http://localhost:5000';

if (token) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
}

async function doLogin() {
    baseUrl = document.getElementById('server').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch(`${baseUrl}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || 'Login falhou');
        const data = await res.json();
        token = data.token;
        localStorage.setItem('chatpy_admin_token', token);
        localStorage.setItem('chatpy_admin_server', baseUrl);
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAll();
    } catch (e) {
        document.getElementById('loginError').textContent = e.message;
    }
}

function headers() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

async function api(path) {
    const res = await fetch(`${baseUrl}${path}`, { headers: headers() });
    if (res.status === 401) {
        localStorage.removeItem('chatpy_admin_token');
        location.reload();
        return null;
    }
    return res.json();
}

async function loadAll() {
    loadHealth();
    loadUsers();
    loadRooms();
    loadPeers();
    loadBackups();
    loadVersion();
}

async function loadHealth() {
    try {
        const data = await fetch(`${baseUrl}/health`).then(r => r.json());
        const el = document.getElementById('health');
        el.textContent = JSON.stringify(data, null, 2);

        // KPIs
        const kpis = document.getElementById('kpis');
        const comps = data.components || {};
        kpis.innerHTML = `
            <div class="card"><h3>Status</h3><div class="value ${data.status === 'healthy' ? '' : 'err'}">${data.status}</div></div>
            <div class="card"><h3>Database</h3><div class="value ${comps.database === 'ok' ? '' : 'err'}">${comps.database || '?'}</div></div>
            <div class="card"><h3>WebSocket</h3><div class="value">${comps.websocket || '?'}</div></div>
            <div class="card"><h3>Rate Limiter</h3><div class="value ${comps.rate_limiter === 'ok' ? '' : 'err'}">${comps.rate_limiter || '?'}</div></div>
            <div class="card"><h3>Federação</h3><div class="value">${comps.federation || '?'}</div></div>
            <div class="card"><h3>Versão</h3><div class="value" style="font-size:20px">${data.version}</div></div>
        `;
    } catch (e) {
        console.error(e);
    }
}

async function loadUsers() {
    const users = await api('/api/users/online');
    if (!users) return;
    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = users.map(u => `<tr><td>${u.username}</td><td><span class="badge ${u.status === 'online' ? 'ok' : 'warn'}">${u.status}</span></td></tr>`).join('');
}

async function loadRooms() {
    const rooms = await api('/api/rooms');
    if (!rooms) return;
    const tbody = document.querySelector('#roomsTable tbody');
    tbody.innerHTML = rooms.map(r => `<tr><td>${r.name}</td><td>${r.is_private ? 'Privada' : 'Pública'}</td><td>${r.description || ''}</td></tr>`).join('');
}

async function loadPeers() {
    const peers = await api('/api/admin/peers');
    if (!peers) return;
    const tbody = document.querySelector('#peersTable tbody');
    tbody.innerHTML = peers.map(p => `<tr><td>${p.domain}</td><td>${p.base_url}</td><td>${p.trust_level}</td><td>${p.is_active ? '✅' : '❌'}</td></tr>`).join('') || '<tr><td colspan="4" style="color:#888">Nenhum peer cadastrado</td></tr>';
}

async function loadBackups() {
    const data = await api('/api/admin/backups');
    if (!data) return;
    const el = document.getElementById('backups');
    if (!data.enabled) {
        el.innerHTML = '<p style="color:#888">Backup desabilitado (BACKUP_ENABLED=false)</p>';
        return;
    }
    if (!data.backups || data.backups.length === 0) {
        el.innerHTML = '<p style="color:#888">Nenhum backup ainda.</p>';
        return;
    }
    el.innerHTML = data.backups.map(b => `<div>${b.filename} — ${b.size_mb} MB — ${new Date(b.created_at).toLocaleString()}</div>`).join('');
}

async function triggerBackup() {
    const res = await fetch(`${baseUrl}/api/admin/backups/now`, { method: 'POST', headers: headers() });
    const data = await res.json();
    alert(data.message || data.detail || 'Done');
    loadBackups();
}

async function loadVersion() {
    try {
        const data = await fetch(`${baseUrl}/api/version`).then(r => r.json());
        // já mostrado no health
    } catch (e) {}
}

// Auto-refresh a cada 30s
setInterval(() => {
    if (token) loadAll();
}, 30000);
</script>
</body>
</html>
