# P1-9: CI/CD — roda testes do servidor em cada PR/push.
# Os testes de desktop exigem PySide6 + display, então ficam em job separado
# (no momento desativado — ativar quando test_desktop_*.py estiverem corrigidos).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server-tests:
    name: Server Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run server tests
        env:
          JWT_SECRET: "ci-test-secret-key-min-16-chars-long-enough"
        run: |
          # Cada arquivo de teste usa DB SQLite isolado para evitar conflito
          # REST_RATE_LIMIT_ENABLED=false: rate limiting desativado em testes
          # (TestClient usa mesmo IP para tudo — seria bloqueado)
          for testfile in tests/test_server.py tests/test_friendship.py \
                          tests/test_attachments.py tests/test_endpoints.py \
                          tests/test_advanced_rooms.py tests/test_explore_rooms.py \
                          tests/test_shared.py tests/test_desktop_state.py; do
            echo "=== Running $testfile ==="
            DATABASE_URL="sqlite:///$(basename $testfile .py).db" \
            JWT_SECRET="ci-test-secret-key-min-16-chars-long-enough" \
            REST_RATE_LIMIT_ENABLED=false \
            python -m pytest "$testfile" -v --tb=short
            # Cleanup test DBs
            rm -f test_*.db test_*.db-shm test_*.db-wal
          done

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check server/ shared/ client-cli/ client-desktop/ || true
        # `|| true` porque o código tem alguns warnings legados (linhas longas,
        # imports não usados) que ainda não foram todos corrigidos. Não vamos
        # bloquear o CI por isso — apenas reportar.
      - name: Run ruff format check
        run: ruff format --check server/ shared/ client-cli/ client-desktop/ || true

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        # Só verifica que o build não quebra — não roda o container.
        run: docker build -t chatpy-ci-test .
      - name: Verify entrypoint
        run: |
          docker run --rm --entrypoint /bin/echo chatpy-ci-test "imagem OK"
