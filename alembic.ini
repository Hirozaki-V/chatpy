# #15: Configuração do Alembic para migrations de schema.
#
# Antes do Alembic, o servidor usava `Base.metadata.create_all()` que só
# cria tabelas novas — não adiciona colunas em tabelas existentes. Em
# produção, adicionar `is_guest`, `expires_at`, `ServerPeer`, etc. sem
# Alembic exigia SQL manual.
#
# Como usar:
#   1. pip install alembic
#   2. alembic init alembic  (já feito — este arquivo é o resultado)
#   3. Editar alembic.ini e este env.py para apontar para DATABASE_URL
#   4. Para criar migration após mudar models:
#        alembic revision --autogenerate -m "descrição da mudança"
#   5. Para aplicar migrations:
#        alembic upgrade head
#   6. Para rollback:
#        alembic downgrade -1
#
# Em produção (Docker), aplicar migrations no startup do container:
#   CMD ["sh", "-c", "alembic upgrade head && uvicorn server.main:app ..."]

[alembic]
# URL do banco — pode ser sobrescrita pela env DATABASE_URL
sqlalchemy.url = sqlite:///chatpy.db

# Diretório de migrations
script_location = alembic

# Template de timezone
timezone = UTC

# Tamanho máximo da linha nos arquivos de migration
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
